<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mermaid 系統架構圖產生器</title>
    <!-- 引入 Tailwind CSS 進行快速排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 FontAwesome 以支援圖表中的 fa:fa-robot 等圖示 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- === CSS 區塊 (可獨立存為 style.css) === -->
    <style>
        /* 自訂捲軸樣式 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        
        /* 隱藏/顯示區塊動畫 */
        .fade-enter-active, .fade-leave-active {
            transition: opacity 0.3s;
        }
        .fade-enter-from, .fade-leave-to {
            opacity: 0;
        }

        /* 確保 Mermaid 容器能夠自適應與滾動 */
        #mermaid-container svg {
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body class="bg-slate-100 h-screen flex flex-col font-sans text-slate-800 overflow-hidden" id="app">
    <!-- === HTML 區塊 (可獨立存為 index.html 的 Body) === -->
    
    <!-- 頂部導覽列 -->
    <header class="bg-white shadow-sm border-b border-slate-200 py-3 px-6 flex justify-between items-center z-10 shrink-0">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-diagram-project text-blue-600 text-xl"></i>
            <h1 class="text-xl font-bold text-slate-800">Mermaid 系統架構圖產生器</h1>
        </div>
        <div class="flex gap-2">
            <button @click="mode = 'builder'" :class="mode === 'builder' ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'" class="px-4 py-2 rounded-md text-sm font-medium transition-colors">
                <i class="fa-solid fa-sliders mr-2"></i>表單建構模式
            </button>
            <button @click="mode = 'manual'" :class="mode === 'manual' ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'" class="px-4 py-2 rounded-md text-sm font-medium transition-colors">
                <i class="fa-solid fa-code mr-2"></i>手動編輯原始碼
            </button>
        </div>
    </header>

    <!-- 主要內容區 -->
    <main class="flex-1 flex overflow-hidden">
        
        <!-- 左側面板：表單建構器 (僅在 builder 模式顯示) -->
        <aside v-show="mode === 'builder'" class="w-1/3 min-w-[400px] bg-white border-r border-slate-200 flex flex-col h-full overflow-hidden shrink-0 z-0 shadow-[2px_0_10px_rgba(0,0,0,0.02)]">
            <div class="p-4 bg-slate-50 border-b border-slate-200 font-medium text-slate-700 flex justify-between items-center shrink-0">
                <span>架構元素設定</span>
                <select v-model="state.direction" class="text-sm border border-slate-300 rounded px-2 py-1 bg-white">
                    <option value="TB">由上而下 (TB / TD)</option>
                    <option value="BT">由下而上 (BT)</option>
                    <option value="LR">由左至右 (LR)</option>
                    <option value="RL">由右至左 (RL)</option>
                </select>
            </div>
            
            <div class="flex-1 overflow-y-auto p-4 space-y-6">
                
                <!-- 子圖 (Subgraphs) 設定 -->
                <section>
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="font-bold text-slate-800 flex items-center gap-2"><i class="fa-solid fa-object-group text-slate-400"></i> 子區塊 (Subgraphs)</h3>
                        <button @click="addSubgraph" class="text-xs bg-blue-50 text-blue-600 hover:bg-blue-100 px-2 py-1 rounded"><i class="fa-solid fa-plus"></i> 新增</button>
                    </div>
                    <div class="space-y-2">
                        <div v-for="(sg, index) in state.subgraphs" :key="'sg-'+index" class="flex gap-2 items-center bg-slate-50 p-2 rounded border border-slate-200">
                            <input v-model="sg.id" placeholder="ID (選填)" class="w-1/3 text-sm border border-slate-300 rounded px-2 py-1">
                            <input v-model="sg.title" placeholder="標題名稱" class="flex-1 text-sm border border-slate-300 rounded px-2 py-1">
                            <button @click="removeSubgraph(index)" class="text-red-400 hover:text-red-600 px-1"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                </section>

                <!-- 節點 (Nodes) 設定 -->
                <section>
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="font-bold text-slate-800 flex items-center gap-2"><i class="fa-solid fa-server text-slate-400"></i> 節點與元件 (Nodes)</h3>
                        <button @click="addNode" class="text-xs bg-blue-50 text-blue-600 hover:bg-blue-100 px-2 py-1 rounded"><i class="fa-solid fa-plus"></i> 新增</button>
                    </div>
                    <div class="space-y-3">
                        <div v-for="(node, index) in state.nodes" :key="'node-'+index" class="bg-slate-50 p-3 rounded border border-slate-200 relative group">
                            <button @click="removeNode(index)" class="absolute top-2 right-2 text-slate-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><i class="fa-solid fa-xmark"></i></button>
                            <div class="grid grid-cols-2 gap-2 mb-2">
                                <div>
                                    <label class="text-xs text-slate-500">節點 ID</label>
                                    <input v-model="node.id" class="w-full text-sm border border-slate-300 rounded px-2 py-1 mt-1">
                                </div>
                                <div>
                                    <label class="text-xs text-slate-500">歸屬子區塊</label>
                                    <select v-model="node.subgraph" class="w-full text-sm border border-slate-300 rounded px-2 py-1 mt-1 bg-white">
                                        <option value="">(無)</option>
                                        <option v-for="sg in state.subgraphs" :value="sg.id || sg.title">{{ sg.title }}</option>
                                    </select>
                                </div>
                            </div>
                            <div class="mb-2">
                                <label class="text-xs text-slate-500">顯示標籤 (支援 Enter 換行與 HTML/fa:fa-icon)</label>
                                <textarea v-model="node.label" rows="2" class="w-full text-sm border border-slate-300 rounded px-2 py-1 mt-1 resize-y"></textarea>
                            </div>
                            <div>
                                <label class="text-xs text-slate-500">形狀 (Shape)</label>
                                <select v-model="node.shape" class="w-full text-sm border border-slate-300 rounded px-2 py-1 mt-1 bg-white">
                                    <optgroup label="基本與特殊形狀">
                                        <option value="rect">矩形 (Rect)</option>
                                        <option value="rounded">圓角矩形 (Rounded)</option>
                                        <option value="stadium_bracket">藥丸/體育場 (Stadium) ([ ])</option>
                                        <option value="cylinder">圓柱/資料庫 (Cylinder)</option>
                                        <option value="diamond">菱形/判斷 (Diamond)</option>
                                        <option value="circle">圓形 (Circle)</option>
                                        <option value="double_circle_bracket">雙圓/停止 (Double Circle) ((( )))</option>
                                        <option value="hexagon">六角形 (Hexagon)</option>
                                        <option value="subroutine">子程式 (Subroutine)</option>
                                        <option value="asymmetric">不對稱 (Asymmetric)</option>
                                        <option value="parallelogram">平行四邊形 (Parallelogram)</option>
                                        <option value="parallelogram_alt">反平行四邊形 (Parallelogram Alt)</option>
                                        <option value="trapezoid">梯形 (Trapezoid)</option>
                                        <option value="trapezoid_alt">反梯形 (Trapezoid Alt)</option>
                                    </optgroup>
                                    <optgroup label="v11 新版形狀 (@{})">
                                        <option value="docs">多重文件 (Docs)</option>
                                        <option value="manual-file">手動檔案 (Manual-file)</option>
                                        <option value="manual-input">手動輸入 (Manual-input)</option>
                                        <option value="procs">處理程序 (Procs)</option>
                                        <option value="paper-tape">紙帶 (Paper-tape)</option>
                                        <option value="stadium">體育場/終端點 (Stadium)</option>
                                        <option value="dbl-circ">雙圓/停止 (Dbl-circ)</option>
                                        <option value="notch-rect">卡片 (Notch-rect)</option>
                                        <option value="delay">延遲 (Delay)</option>
                                        <option value="das">直接存取儲存 (Das)</option>
                                        <option value="lin-cyl">磁碟儲存 (Lin-cyl)</option>
                                        <option value="curv-trap">顯示器 (Curv-trap)</option>
                                        <option value="tri">提取 (Tri)</option>
                                        <option value="f-circ">連接點 (F-circ)</option>
                                        <option value="lin-doc">橫線文件 (Lin-doc)</option>
                                        <option value="sl-rect">斜角矩形 (Sl-rect)</option>
                                        <option value="processes">多重程序 (Processes)</option>
                                        <option value="bow-rect">儲存資料 (Bow-rect)</option>
                                        <option value="cross-circ">總結 (Cross-circ)</option>
                                        <option value="tag-doc">標籤文件 (Tag-doc)</option>
                                    </optgroup>
                                </select>
                            </div>
                            <div class="grid grid-cols-2 gap-2 mt-2 border-t border-slate-200 pt-2">
                                <div>
                                    <label class="text-xs text-slate-500">套用樣式類別 (ClassDef)</label>
                                    <select v-model="node.className" class="w-full text-sm border border-slate-300 rounded px-2 py-1 mt-1 bg-white">
                                        <option value="">(無)</option>
                                        <option v-for="c in state.classes" :value="c.name">{{ c.name }}</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="text-xs text-slate-500">獨立自訂樣式 (Inline Style)</label>
                                    <input v-model="node.inlineStyle" placeholder="fill:#f9f,stroke:#333..." class="w-full text-sm border border-slate-300 rounded px-2 py-1 mt-1">
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- 連線 (Edges) 設定 -->
                <section>
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="font-bold text-slate-800 flex items-center gap-2"><i class="fa-solid fa-arrow-right-arrow-left text-slate-400"></i> 連線與資料流 (Edges)</h3>
                        <button @click="addEdge" class="text-xs bg-blue-50 text-blue-600 hover:bg-blue-100 px-2 py-1 rounded"><i class="fa-solid fa-plus"></i> 新增</button>
                    </div>
                    <div class="space-y-3">
                        <div v-for="(edge, index) in state.edges" :key="'edge-'+index" class="bg-slate-50 p-3 rounded border border-slate-200 relative group">
                            <button @click="removeEdge(index)" class="absolute top-2 right-2 text-slate-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><i class="fa-solid fa-xmark"></i></button>
                            <div class="grid grid-cols-2 gap-2 mb-2">
                                <div>
                                    <label class="text-xs text-slate-500">起點 (From)</label>
                                    <select v-model="edge.from" class="w-full text-sm border border-slate-300 rounded px-2 py-1 mt-1 bg-white">
                                        <option v-for="n in state.nodes" :value="n.id">{{ n.id }} ({{ n.label.substring(0, 5) }}...)</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="text-xs text-slate-500">終點 (To)</label>
                                    <select v-model="edge.to" class="w-full text-sm border border-slate-300 rounded px-2 py-1 mt-1 bg-white">
                                        <option v-for="n in state.nodes" :value="n.id">{{ n.id }} ({{ n.label.substring(0, 5) }}...)</option>
                                    </select>
                                </div>
                            </div>
                            <div class="mb-2">
                                <label class="text-xs text-slate-500">線段文字說明</label>
                                <input v-model="edge.text" class="w-full text-sm border border-slate-300 rounded px-2 py-1 mt-1">
                            </div>
                            <div class="flex items-center gap-4">
                                <div class="flex-1">
                                    <label class="text-xs text-slate-500">線段樣式</label>
                                    <select v-model="edge.type" class="w-full text-sm border border-slate-300 rounded px-2 py-1 mt-1 bg-white">
                                        <optgroup label="帶箭頭連線">
                                            <option value="-->">實線箭頭 (-->)</option>
                                            <option value="==>">粗實線箭頭 (==>)</option>
                                            <option value="-.->">虛線箭頭 (-.->)</option>
                                            <option value="--o">末端圓圈 (--o)</option>
                                            <option value="--x">末端叉號 (--x)</option>
                                            <option value="<-->">雙向實線箭頭 (<-->)</option>
                                            <option value="o--o">雙向圓圈 (o--o)</option>
                                            <option value="x--x">雙向叉號 (x--x)</option>
                                        </optgroup>
                                        <optgroup label="無箭頭連線">
                                            <option value="---">實線 (---)</option>
                                            <option value="===">粗實線 (===)</option>
                                            <option value="-.-">虛線 (-.-)</option>
                                        </optgroup>
                                    </select>
                                </div>
                                <div class="flex items-center gap-2 mt-5">
                                    <input type="checkbox" :id="'anim-'+index" v-model="edge.animated" class="rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                                    <label :for="'anim-'+index" class="text-sm text-slate-700 cursor-pointer">流動動畫</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
                
                <!-- 自訂樣式 (Classes) 設定 -->
                <section>
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="font-bold text-slate-800 flex items-center gap-2"><i class="fa-solid fa-palette text-slate-400"></i> 自訂樣式類別 (Classes)</h3>
                        <button @click="addClass" class="text-xs bg-blue-50 text-blue-600 hover:bg-blue-100 px-2 py-1 rounded"><i class="fa-solid fa-plus"></i> 新增</button>
                    </div>
                    <div class="space-y-2">
                        <div v-for="(cls, index) in state.classes" :key="'cls-'+index" class="bg-slate-50 p-3 rounded border border-slate-200 relative group">
                            <button @click="removeClass(index)" class="absolute top-2 right-2 text-slate-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><i class="fa-solid fa-xmark"></i></button>
                            <div class="flex flex-col gap-2">
                                <div>
                                    <label class="text-xs text-slate-500">類別名稱 (Name)</label>
                                    <input v-model="cls.name" placeholder="如: green" class="w-full text-sm border border-slate-300 rounded px-2 py-1 mt-1">
                                </div>
                                <div>
                                    <label class="text-xs text-slate-500">樣式定義 (Style Definition)</label>
                                    <input v-model="cls.def" placeholder="如: fill:#f96,stroke:#333,stroke-width:4px" class="w-full text-sm border border-slate-300 rounded px-2 py-1 mt-1">
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- 底部空間 -->
                <div class="h-10"></div>
            </div>
        </aside>

        <!-- 右側面板：預覽與程式碼 -->
        <section class="flex-1 flex flex-col bg-slate-200/50 relative">
            
            <!-- 預覽區塊 -->
            <div class="flex-1 p-6 flex flex-col min-h-[50%]">
                <div class="bg-white rounded-t-lg border border-slate-200 border-b-0 px-4 py-2 flex justify-between items-center shrink-0">
                    <span class="font-bold text-slate-700"><i class="fa-solid fa-eye text-blue-500 mr-2"></i>架構圖即時預覽</span>
                    <span v-if="renderError" class="text-xs text-red-500 font-mono bg-red-50 px-2 py-1 rounded border border-red-100 flex items-center gap-1"><i class="fa-solid fa-triangle-exclamation"></i> 語法解析錯誤</span>
                    <span v-else class="text-xs text-green-600 font-mono bg-green-50 px-2 py-1 rounded border border-green-100 flex items-center gap-1"><i class="fa-solid fa-check"></i> 渲染成功</span>
                </div>
                <div class="bg-white border border-slate-200 rounded-b-lg p-6 flex-1 overflow-auto flex items-center justify-center shadow-sm relative">
                    <!-- Mermaid 繪製目標 -->
                    <div id="mermaid-container" class="w-full flex justify-center"></div>
                </div>
            </div>

            <!-- 程式碼編輯/顯示區塊 -->
            <div class="h-1/3 min-h-[250px] p-6 pt-0 flex flex-col shrink-0">
                <div class="bg-slate-800 rounded-t-lg border border-slate-700 px-4 py-2 flex justify-between items-center shrink-0">
                    <span class="font-bold text-slate-200"><i class="fa-solid fa-file-code text-blue-400 mr-2"></i>Mermaid 原始碼</span>
                    <button @click="copyCode" class="text-xs bg-slate-700 text-slate-300 hover:text-white hover:bg-slate-600 px-3 py-1.5 rounded transition-colors flex items-center gap-1">
                        <i class="fa-solid fa-copy"></i> 複製原始碼
                    </button>
                </div>
                <div class="flex-1 relative">
                    <!-- 當在建構器模式時，顯示唯讀程式碼 -->
                    <textarea v-if="mode === 'builder'" readonly :value="generatedCode" class="w-full h-full bg-slate-900 text-green-400 font-mono text-sm p-4 rounded-b-lg border border-t-0 border-slate-700 focus:outline-none resize-none overflow-y-auto"></textarea>
                    
                    <!-- 當在手動模式時，顯示可編輯的 textarea -->
                    <textarea v-else v-model="manualCode" class="w-full h-full bg-slate-900 text-blue-300 font-mono text-sm p-4 rounded-b-lg border border-t-0 border-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none overflow-y-auto placeholder-slate-600" placeholder="在此直接輸入 Mermaid 語法..."></textarea>
                </div>
            </div>
        </section>
        
    </main>

    <!-- 自訂提示訊息 (Toast) -->
    <transition name="fade">
        <div v-if="toastMsg" class="fixed bottom-6 right-6 bg-slate-800 text-white px-6 py-3 rounded-lg shadow-xl flex items-center gap-3 z-50">
            <i class="fa-solid fa-circle-check text-green-400"></i>
            {{ toastMsg }}
        </div>
    </transition>

    <!-- === JavaScript 區塊 (可獨立存為 main.js) === -->
    <!-- 引入 Vue 3 (不需編譯即可執行) -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- 引入 Mermaid v11 (支援新版 @{} 語法與動畫) -->
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
        
        // 初始化 Mermaid 設定
        mermaid.initialize({ 
            startOnLoad: false, 
            theme: 'default',
            securityLevel: 'loose',
            fontFamily: 'ui-sans-serif, system-ui, sans-serif'
        });

        const { createApp, ref, computed, watch, onMounted } = Vue;

        createApp({
            setup() {
                const mode = ref('builder'); // 'builder' 或 'manual'
                const manualCode = ref('');
                const toastMsg = ref('');
                const renderError = ref('');

                // 定義符合您範例的預設狀態
                const state = ref({
                    direction: 'TB',
                    subgraphs: [
                        { id: 'sg1', title: '人事室 AI Agent' },
                        { id: 'sg2', title: '使用者瀏覽器' },
                        { id: 'sg3', title: '人事室後臺管理者瀏覽器' },
                        { id: 'sg4', title: '人事室承辦人' }
                    ],
                    nodes: [
                        { id: 'od', label: '考核組差勤法規庫', shape: 'docs', subgraph: 'sg1' },
                        { id: 'od2', label: '資料組法規庫', shape: 'docs', subgraph: 'sg1' },
                        { id: 'od3', label: '任免組差勤法規庫', shape: 'docs', subgraph: 'sg1' },
                        { id: 'ro', label: '法規<br>向量<br>資料庫', shape: 'cylinder', subgraph: 'sg1' },
                        { id: 'di', label: 'fa:fa-robot <br/> AI Agent <br/> 鎖定語言回復原則 <br/> RAG', shape: 'diamond', subgraph: 'sg1', className: 'orange' },
                        
                        { id: 'od4', label: 'HTML<br>CSS', shape: 'rect', subgraph: 'sg2' },
                        { id: 'od5', label: 'JavaScript <br> WebGPU', shape: 'rect', subgraph: 'sg2' },
                        
                        { id: 'od6', label: 'HTML<br>CSS', shape: 'rect', subgraph: 'sg3' },
                        { id: 'od7', label: 'JavaScript <br> WebGPU', shape: 'rect', subgraph: 'sg3' },
                        
                        { id: 'e', label: '外部開源 WebGPU <br> LLM 資料庫 <br> 供使用者下載', shape: 'circle', subgraph: '', className: 'green' },
                        
                        { id: 'od8', label: '考核組', shape: 'rect', subgraph: 'sg4' },
                        { id: 'od9', label: '資料組', shape: 'rect', subgraph: 'sg4' },
                        { id: 'od10', label: '任免組', shape: 'rect', subgraph: 'sg4' }
                    ],
                    edges: [
                        { id: 'e1', from: 'od', to: 'ro', text: 'Embedding ', type: '-->', animated: true },
                        { id: 'e2', from: 'od2', to: 'ro', text: 'Embedding ', type: '-->', animated: true },
                        { id: 'e3', from: 'od3', to: 'ro', text: 'Embedding ', type: '-->', animated: true },
                        { id: 'e4', from: 'di', to: 'ro', text: '建立 Embedding 規則', type: '-->', animated: true },
                        
                        { id: 'e_link1', from: 'od4', to: 'od5', text: '', type: '--o', animated: false },
                        { id: 'e5', from: 'od5', to: 'di', text: '自然語言查詢法規', type: '-->', animated: true },
                        
                        { id: 'e_link2', from: 'od6', to: 'od7', text: '', type: '--o', animated: false },
                        { id: 'e6', from: 'od7', to: 'di', text: '查詢 法規向量資料庫', type: '==>', animated: true },
                        
                        { id: 'e7', from: 'e', to: 'od5', text: '', type: '==>', animated: true },
                        
                        { id: 'e_link3', from: 'od8', to: 'od', text: '', type: '-->', animated: false },
                        { id: 'e_link4', from: 'od9', to: 'od2', text: '', type: '-->', animated: false },
                        { id: 'e_link5', from: 'od10', to: 'od3', text: '', type: '-->', animated: false }
                    ],
                    // 保留您範例中的自訂樣式，並將指定邏輯移轉至 Node 物件中
                    classes: [
                        { name: 'green', def: 'fill:#9f6,stroke:#333,stroke-width:2px;' },
                        { name: 'orange', def: 'fill:#f96,stroke:#333,stroke-width:4px;' }
                    ]
                });

                // 自動將表單狀態轉譯為 Mermaid 語法 (支援 v11 的動畫與新形狀語法)
                const generatedCode = computed(() => {
                    let code = `graph ${state.value.direction}\n`;

                    // 處理節點形狀的 Helper 函數
                    const getShapeStr = (n) => {
                        // 將真實的換行符號轉為 Mermaid 支援的 <br/>，並將雙引號轉義避免破壞語法
                        let label = n.label.replace(/\n/g, '<br/>').replace(/"/g, '&quot;');
                        
                        // 處理 v11 新版形狀 (@{} 語法)
                        const v11Shapes = ['docs', 'manual-file', 'manual-input', 'procs', 'paper-tape', 'stadium', 'dbl-circ', 'notch-rect', 'delay', 'das', 'lin-cyl', 'curv-trap', 'tri', 'f-circ', 'lin-doc', 'sl-rect', 'processes', 'bow-rect', 'cross-circ', 'tag-doc'];
                        if (v11Shapes.includes(n.shape)) {
                            return `${n.id}@{ shape: ${n.shape}, label: "${label}" }`;
                        }

                        // 處理傳統括號形狀 (為提升穩定性，統一用雙引號將標籤包起來)
                        let quotedLabel = `"${label}"`;
                        switch(n.shape) {
                            case 'rect': return `${n.id}[${quotedLabel}]`;
                            case 'rounded': return `${n.id}(${quotedLabel})`;
                            case 'stadium_bracket': return `${n.id}([${quotedLabel}])`;
                            case 'cylinder': return `${n.id}[(${quotedLabel})]`;
                            case 'diamond': return `${n.id}{${quotedLabel}}`;
                            case 'circle': return `${n.id}((${quotedLabel}))`;
                            case 'double_circle_bracket': return `${n.id}((({${quotedLabel})))`;
                            case 'hexagon': return `${n.id}{{${quotedLabel}}}`;
                            case 'subroutine': return `${n.id}[[${quotedLabel}]]`;
                            case 'asymmetric': return `${n.id}>${quotedLabel}]`;
                            case 'parallelogram': return `${n.id}[/${quotedLabel}/]`;
                            case 'parallelogram_alt': return `${n.id}[\\${quotedLabel}\\]`;
                            case 'trapezoid': return `${n.id}[/${quotedLabel}\\]`;
                            case 'trapezoid_alt': return `${n.id}[\\${quotedLabel}/]`;
                            default: return `${n.id}[${quotedLabel}]`;
                        }
                    };

                    // 1. 處理具有 Subgraph 的節點
                    state.value.subgraphs.forEach(sg => {
                        // 使用官方推薦的 subgraph ID [Title] 語法，更穩定
                        if (sg.id && sg.id.trim() !== '') {
                            code += `    subgraph ${sg.id} [${sg.title}]\n`;
                        } else {
                            code += `    subgraph ${sg.title}\n`;
                        }
                        
                        state.value.nodes.filter(n => n.subgraph === sg.id || n.subgraph === sg.title).forEach(n => {
                            code += `        ${getShapeStr(n)}\n`;
                        });
                        code += `    end\n\n`;
                    });

                    // 2. 處理沒有歸屬 Subgraph 的獨立節點
                    state.value.nodes.filter(n => !n.subgraph).forEach(n => {
                        code += `    ${getShapeStr(n)}\n`;
                    });
                    code += '\n';

                    // 3. 處理線段與動畫 (修復：補回連線生成邏輯)
                    state.value.edges.forEach((e, idx) => {
                        let edgeType = e.type || '-->';
                        // 若啟用動畫，必須使用 v11 新版線段語法
                        if (e.animated) {
                            let edgeId = e.id || `edge_anim_${idx}`;
                            if (e.text) {
                                code += `    ${e.from} ${edgeId}@${edgeType}|${e.text}| ${e.to}\n`;
                            } else {
                                code += `    ${e.from} ${edgeId}@${edgeType} ${e.to}\n`;
                            }
                            code += `    ${edgeId}@{ animate: true }\n`;
                        } else {
                            // 傳統無動畫線段語法
                            if (e.text) {
                                code += `    ${e.from} ${edgeType}|${e.text}| ${e.to}\n`;
                            } else {
                                code += `    ${e.from} ${edgeType} ${e.to}\n`;
                            }
                        }
                    });
                    code += '\n';

                    // 4. 寫入自訂 CSS Class 與獨立樣式 (Inline Styles)
                    if (state.value.classes.length > 0) {
                        state.value.classes.forEach(c => {
                            if (c.name && c.def) {
                                code += `    classDef ${c.name} ${c.def}\n`;
                            }
                        });
                    }
                    
                    // 掃描所有節點套用的樣式與 Class
                    state.value.nodes.forEach(n => {
                        if (n.className) {
                            code += `    class ${n.id} ${n.className}\n`;
                        }
                        if (n.inlineStyle && n.inlineStyle.trim() !== '') {
                            code += `    style ${n.id} ${n.inlineStyle}\n`;
                        }
                    });

                    return code;
                });

                // 決定當前要渲染的程式碼來源
                const currentCode = computed(() => {
                    return mode.value === 'builder' ? generatedCode.value : manualCode.value;
                });

                // 當切換到手動模式時，將目前的生成碼複製過去
                watch(mode, (newMode) => {
                    if (newMode === 'manual') {
                        manualCode.value = generatedCode.value;
                    }
                });

                // 呼叫 Mermaid 進行繪製
                const renderDiagram = async () => {
                    if (!currentCode.value.trim()) return;
                    renderError.value = '';
                    // 產生唯一的 ID 避免衝突，並移至 try 外部以供 catch 區塊存取
                    const id = `mermaid-svg-${Date.now()}`;
                    try {
                        const container = document.getElementById('mermaid-container');
                        container.innerHTML = ''; // 清空舊圖
                        const { svg } = await mermaid.render(id, currentCode.value);
                        container.innerHTML = svg;
                    } catch (e) {
                        console.error('Mermaid render error:', e);
                        renderError.value = e.message || '語法解析失敗';
                        // 嘗試清理錯誤時產生的隱藏 DOM
                        const errorMsgDOM = document.querySelector(`#d${id}`);
                        if(errorMsgDOM) errorMsgDOM.remove();
                    }
                };

                // 監聽程式碼變動，使用防抖 (Debounce) 來觸發重新繪製
                let renderTimeout;
                watch(currentCode, () => {
                    clearTimeout(renderTimeout);
                    renderTimeout = setTimeout(() => {
                        renderDiagram();
                    }, 500); // 延遲 500ms 避免輸入時頻繁閃爍
                }, { immediate: true });

                // 複製程式碼功能 (使用替代傳統 execCommand 的做法以確保相容性)
                const copyCode = () => {
                    const el = document.createElement('textarea');
                    el.value = currentCode.value;
                    document.body.appendChild(el);
                    el.select();
                    document.execCommand('copy');
                    document.body.removeChild(el);
                    
                    toastMsg.value = '已將 Mermaid 原始碼複製到剪貼簿！';
                    setTimeout(() => { toastMsg.value = ''; }, 3000);
                };

                // 表單操作 Helper
                const addSubgraph = () => state.value.subgraphs.push({ id: `sg${Date.now()}`, title: '新區塊' });
                const removeSubgraph = (idx) => state.value.subgraphs.splice(idx, 1);
                
                const addNode = () => state.value.nodes.push({ id: `n${Date.now()}`, label: '新節點', shape: 'rect', subgraph: '' });
                const removeNode = (idx) => state.value.nodes.splice(idx, 1);
                
                const addEdge = () => state.value.edges.push({ id: `e${Date.now()}`, from: '', to: '', text: '', type: '-->', animated: false });
                const removeEdge = (idx) => state.value.edges.splice(idx, 1);
                
                const addClass = () => state.value.classes.push({ name: `style${Date.now().toString().slice(-4)}`, def: 'fill:#fff,stroke:#333,stroke-width:2px;' });
                const removeClass = (idx) => state.value.classes.splice(idx, 1);

                return { 
                    state, mode, manualCode, currentCode, generatedCode,
                    renderError, toastMsg, copyCode,
                    addSubgraph, removeSubgraph, addNode, removeNode, addEdge, removeEdge, addClass, removeClass
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
