<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeckEdit - 專業版 AI 簡報解析器 (終極物件保護版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/libs/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.min.js"></script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { background-color: #0d1117; color: #c9d1d9; }
        .progress-glow { box-shadow: 0 0 15px rgba(59, 130, 246, 0.6); }
        .page-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .page-checkbox:checked + label { border-color: #3b82f6; background-color: rgba(59, 130, 246, 0.05); }
        
        .slide-in { animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .cursor-zoom-in { cursor: zoom-in; }
        .log-item { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 11px; }
        .details-content { transition: max-height 0.3s ease-out; overflow: hidden; }
    </style>
</head>
<body class="min-h-screen font-sans flex flex-col no-scrollbar selection:bg-blue-500/30">

    <header class="bg-[#161b22] border-b border-[#30363d] px-8 py-5 flex justify-between items-center sticky top-0 z-40 backdrop-blur-xl bg-opacity-80">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2.5 rounded-xl text-white shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <h1 class="text-xl font-black text-white tracking-tighter uppercase italic text-[16px]">DeckEdit <span class="text-blue-500 not-italic text-[10px] font-mono ml-1">ULTIMATE_RECON</span></h1>
        </div>
        <div class="flex gap-4">
            <button id="btn-ocr" class="hidden bg-blue-600 hover:bg-blue-500 text-white px-6 py-2.5 rounded-xl font-bold shadow-xl transition-all text-sm active:scale-95 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                啟動視覺重構
            </button>
            <button id="btn-export" class="hidden bg-[#238636] hover:bg-[#2ea043] text-white px-6 py-2.5 rounded-xl font-bold shadow-xl transition-all text-sm active:scale-95">
                匯出 PPTX
            </button>
        </div>
    </header>

    <div id="live-progress-container" class="h-1 w-full bg-[#30363d] sticky top-[73px] z-40 hidden">
        <div id="live-progress-bar" class="h-full bg-blue-500 progress-glow transition-all duration-300 w-0"></div>
    </div>

    <main class="flex-1 p-8 flex flex-col items-center overflow-hidden relative">
        <div id="drop-zone" class="w-full max-w-3xl border-2 border-dashed border-[#30363d] rounded-[2.5rem] bg-[#161b22] flex flex-col items-center justify-center p-24 transition-all hover:border-blue-500 group cursor-pointer mt-12">
            <div class="bg-[#0d1117] p-8 rounded-full mb-8 group-hover:scale-110 transition-transform duration-500 shadow-inner">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
            </div>
            <h3 class="text-2xl font-black text-white tracking-tight">AI 視覺解構，保留核心物件</h3>
            <p class="text-sm text-gray-400 mt-4 text-center max-w-sm leading-relaxed">
                自動鎖定連續物件區塊（防鏤空），<br>移除雜訊與浮水印，<span class="text-blue-400 font-bold">並以主題色還原純淨背景。</span>
            </p>
            <input type="file" id="file-input" class="hidden" accept=".pdf, image/png, image/jpeg">
        </div>

        <div id="selection-area" class="hidden w-full max-w-6xl flex flex-col overflow-hidden animate-in fade-in duration-700">
            <div class="flex justify-between items-center mb-8 bg-[#161b22] p-6 rounded-3xl border border-[#30363d] shadow-2xl">
                <div class="flex items-center gap-5">
                    <div class="bg-blue-500/20 text-blue-400 w-12 h-12 rounded-full flex items-center justify-center font-black border border-blue-500/30" id="loaded-pages-count">0</div>
                    <div>
                        <h4 class="text-white font-bold tracking-tight">準備執行重構</h4>
                        <p class="text-[10px] text-gray-500 mt-1 uppercase font-mono tracking-widest text-[10px]">Connected object preservation scan initialized</p>
                    </div>
                </div>
                <div class="flex gap-3">
                    <button onclick="toggleAllPages(true)" class="text-xs font-bold text-gray-300 hover:text-white bg-[#21262d] px-5 py-2.5 rounded-xl border border-[#30363d]">全選</button>
                    <button onclick="toggleAllPages(false)" class="text-xs font-bold text-gray-300 hover:text-white bg-[#21262d] px-5 py-2.5 rounded-xl border border-[#30363d]">取消</button>
                </div>
            </div>
            <div id="selection-grid" class="flex-1 overflow-y-auto grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-8 p-4 no-scrollbar"></div>
        </div>

        <div id="workspace" class="hidden w-full max-w-6xl h-full flex flex-col overflow-auto no-scrollbar pb-32 pt-4">
            <div id="status-banner" class="mb-10 flex items-center justify-between bg-blue-500/5 border border-blue-500/20 p-5 rounded-3xl">
                <div class="flex items-center gap-4">
                    <div class="w-2.5 h-2.5 bg-blue-500 rounded-full animate-pulse shadow-[0_0_10px_rgba(59,130,246,0.8)]"></div>
                    <span id="banner-text" class="text-sm font-bold text-blue-400 font-mono uppercase tracking-tighter text-[11px]">AI_ENGINE: 2D_CONNECTIVITY_MAPPING...</span>
                </div>
                <div id="mini-progress-text" class="text-xs font-mono text-blue-500/70 uppercase">0% Completed</div>
            </div>
            <div id="pages-container" class="w-full flex flex-col gap-24"></div>
        </div>

        <div id="loading-overlay" class="fixed inset-0 bg-[#0d1117]/95 backdrop-blur-2xl z-50 hidden flex-col items-center justify-center">
            <div class="relative w-28 h-28 mb-12">
                <div class="absolute inset-0 border-[6px] border-blue-500/10 rounded-full"></div>
                <div class="absolute inset-0 border-[6px] border-t-blue-500 rounded-full animate-spin"></div>
            </div>
            <h3 class="text-2xl font-black text-white tracking-[0.3em] uppercase">Syncing AI Assets</h3>
            <p id="loading-text" class="text-sm text-gray-500 mt-4 font-mono text-center tracking-tight">Fetching models from Hugging Face...</p>
            <div class="w-72 bg-[#161b22] rounded-full h-1 mt-10 overflow-hidden shadow-inner">
                <div id="initial-progress-bar" class="bg-blue-500 h-full w-0 transition-all duration-300 progress-glow"></div>
            </div>
        </div>

        <div id="lightbox" onclick="closeLightbox()" class="fixed inset-0 bg-[#0d1117]/95 backdrop-blur-2xl z-[100] hidden flex-col items-center justify-center p-6 animate-in fade-in duration-300 cursor-pointer">
            <button onclick="closeLightbox()" class="absolute top-10 right-10 text-gray-400 hover:text-white z-50 transition-all transform hover:scale-110">
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
            <div onclick="event.stopPropagation()" class="max-w-[90vw] max-h-[80vh] bg-[#161b22] rounded-[2.5rem] p-4 shadow-[0_40px_80px_rgba(0,0,0,0.8)] border border-[#30363d] relative group cursor-default">
                <img id="lightbox-img" src="" class="max-w-full max-h-[75vh] block rounded-[1.8rem] object-contain shadow-2xl">
                <div class="absolute inset-0 flex items-center justify-center bg-black/30 opacity-0 group-hover:opacity-100 transition-opacity duration-300 rounded-[1.8rem]">
                    <button id="lightbox-download" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-4 rounded-full font-black shadow-2xl flex items-center gap-3 active:scale-95 transition-all transform translate-y-4 group-hover:translate-y-0">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="3" y2="15"/></svg>
                        下載重構後的圖檔 (PNG)
                    </button>
                </div>
            </div>
            <div id="lightbox-caption" class="mt-8 text-xs font-black text-blue-500 uppercase tracking-[0.4em] cursor-default" onclick="event.stopPropagation()"></div>
        </div>
    </main>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const HF_USERNAME = 'leno99';
        const DB_NAME = 'ppocr-ultimate-v1';
        const STORE_NAME = 'cache';

        // 配置真實下載路徑：包含 4 個核心檔案
        const RESOURCES = [
            { key: 'ppocr_v5_server_det', repo: 'ppocr_v5_server_det.onnx', ext: 'onnx' },
            { key: 'ppocr_v5_server_rec', repo: 'ppocr_v5_server_rec.onnx', ext: 'onnx' },
            { key: 'ppocr_v5_official_dict_v4', repo: 'ppocr_v5_server_rec.onnx', ext: 'txt' },
            { key: 'english-words-enable-173k-v1', repo: 'ppocr_v5_server_rec.onnx', ext: 'txt' }
        ];

        const elements = {
            dropZone: document.getElementById('drop-zone'),
            fileInput: document.getElementById('file-input'),
            selectionArea: document.getElementById('selection-area'),
            selectionGrid: document.getElementById('selection-grid'),
            workspace: document.getElementById('workspace'),
            pagesContainer: document.getElementById('pages-container'),
            btnOcr: document.getElementById('btn-ocr'),
            btnExport: document.getElementById('btn-export'),
            loading: document.getElementById('loading-overlay'),
            loadingText: document.getElementById('loading-text'),
            initProgress: document.getElementById('initial-progress-bar'),
            liveProgressContainer: document.getElementById('live-progress-container'),
            liveProgressBar: document.getElementById('live-progress-bar'),
            miniProgressText: document.getElementById('mini-progress-text'),
            bannerText: document.getElementById('banner-text'),
            loadedCount: document.getElementById('loaded-pages-count'),
            lightbox: document.getElementById('lightbox'),
            lightboxImg: document.getElementById('lightbox-img'),
            lightboxCap: document.getElementById('lightbox-caption'),
            lightboxDl: document.getElementById('lightbox-download')
        };

        let pagesData = [];

        async function initDB() {
            return new Promise(resolve => {
                const req = indexedDB.open(DB_NAME, 1);
                req.onupgradeneeded = e => e.target.result.createObjectStore(STORE_NAME);
                req.onsuccess = e => resolve(e.target.result);
            });
        }

        async function ensureResources() {
            const db = await initDB();
            let allCached = true;
            for (const res of RESOURCES) {
                const has = await new Promise(r => {
                    const req = db.transaction(STORE_NAME).objectStore(STORE_NAME).get(res.key);
                    req.onsuccess = () => r(req.result);
                });
                if (!has) allCached = false;
            }
            if (allCached) return;

            elements.loading.classList.replace('hidden', 'flex');
            let completed = 0;
            for (const res of RESOURCES) {
                elements.loadingText.innerText = `下載模型資源: ${res.key}.${res.ext}...`;
                const resp = await fetch(`https://huggingface.co/${HF_USERNAME}/${res.repo}/resolve/main/${res.key}.${res.ext}`);
                const buffer = await resp.arrayBuffer();
                await new Promise(r => {
                    const req = db.transaction(STORE_NAME, 'readwrite').objectStore(STORE_NAME).put(buffer, res.key);
                    req.onsuccess = r;
                });
                completed++;
                elements.initProgress.style.width = `${(completed / RESOURCES.length) * 100}%`;
            }
            elements.loading.classList.replace('flex', 'hidden');
        }

        function openLightbox(dataUrl, caption) {
            elements.lightboxImg.src = dataUrl;
            elements.lightboxCap.innerText = caption;
            elements.lightboxDl.onclick = () => {
                const a = document.createElement('a'); a.href = dataUrl;
                a.download = `DeckEdit_${caption.replace(/\s+/g, '_')}.png`; a.click();
            };
            elements.lightbox.classList.replace('hidden', 'flex');
        }
        function closeLightbox() { elements.lightbox.classList.replace('flex', 'hidden'); }

        elements.dropZone.onclick = () => elements.fileInput.click();
        elements.fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            elements.dropZone.classList.add('hidden');
            pagesData = [];
            elements.selectionGrid.innerHTML = '';
            if (file.type === 'application/pdf') {
                const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
                const total = Math.min(pdf.numPages, 50);
                for (let i = 1; i <= total; i++) {
                    const page = await pdf.getPage(i);
                    const vp = page.getViewport({ scale: 0.8 });
                    const canvas = document.createElement('canvas');
                    canvas.width = vp.width; canvas.height = vp.height;
                    await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
                    const pageObj = { pageNum: i, pdfPage: page, thumb: canvas.toDataURL(), selected: true };
                    pagesData.push(pageObj);
                    addPageCard(pageObj);
                }
            }
            elements.loadedCount.innerText = pagesData.length;
            elements.selectionArea.classList.remove('hidden');
            elements.btnOcr.classList.remove('hidden');
        };

        function addPageCard(page) {
            const card = document.createElement('div');
            card.className = 'page-card relative';
            card.innerHTML = `
                <input type="checkbox" id="p-${page.pageNum}" class="page-checkbox hidden" ${page.selected ? 'checked' : ''}>
                <label for="p-${page.pageNum}" class="block border-2 border-[#30363d] rounded-[1.5rem] overflow-hidden cursor-pointer bg-[#161b22] shadow-xl">
                    <div class="aspect-[16/9] bg-white flex items-center justify-center p-3">
                        <img src="${page.thumb}" class="max-w-full max-h-full object-contain">
                    </div>
                    <div class="p-3 text-center text-[9px] font-black text-gray-500 uppercase tracking-widest bg-[#0d1117] border-t border-[#30363d]">
                        Slide ${page.pageNum}
                    </div>
                </label>
            `;
            card.querySelector('input').onchange = e => page.selected = e.target.checked;
            elements.selectionGrid.appendChild(card);
        }

        function toggleAllPages(val) {
            pagesData.forEach(p => p.selected = val);
            document.querySelectorAll('.page-checkbox').forEach(cb => cb.checked = val);
        }

        elements.btnOcr.onclick = async () => {
            const selected = pagesData.filter(p => p.selected);
            if (!selected.length) return;
            elements.btnOcr.disabled = true;
            await ensureResources(); // 觸發從 Hugging Face 下載並快取 4 個檔案
            
            elements.selectionArea.classList.add('hidden');
            elements.btnOcr.classList.add('hidden');
            elements.workspace.classList.remove('hidden');
            elements.liveProgressContainer.classList.remove('hidden');
            
            const worker = await Tesseract.createWorker('chi_tra+eng');

            for (let i = 0; i < selected.length; i++) {
                const page = selected[i];
                const progress = Math.round(((i) / selected.length) * 100);
                elements.liveProgressBar.style.width = `${progress}%`;
                elements.miniProgressText.innerText = `${progress}% COMPLETE`;
                elements.bannerText.innerText = `AI_ENGINE: 2D_CONNECTIVITY_SCAN - PAGE ${page.pageNum}`;

                const vp = page.pdfPage.getViewport({ scale: 2.0 }); 
                const canvas = document.createElement('canvas');
                canvas.width = vp.width; canvas.height = vp.height;
                await page.pdfPage.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
                page.fullCanvas = canvas;

                // 1. OCR 偵測文字區域 (用於避讓，確保文字不會被當作保護物件)
                const { data } = await worker.recognize(canvas);
                page.detectedWords = data.words.filter(w => w.confidence > 40);

                // 2. 分析物件並產生 2D 連通保護遮罩
                const analysis = analyzeObjectsAndTheme(canvas, page.detectedWords);
                page.themeColor = analysis.theme;
                page.protectionMask = analysis.mask;

                await renderReconstructedSlide(page);
                elements.workspace.scrollTo({ top: elements.workspace.scrollHeight, behavior: 'smooth' });
                await new Promise(r => setTimeout(r, 50));
            }

            elements.liveProgressBar.style.width = `100%`;
            elements.bannerText.innerText = `RECONSTRUCTION_COMPLETE. OBJECTS PRESERVED & BACKGROUND PURGED.`;
            elements.bannerText.classList.replace('text-blue-400', 'text-green-400');
            await worker.terminate();
            elements.btnExport.classList.remove('hidden');
        };

        // --- 核心演算法：防鏤空的 2D 連通性保護與主題提取 ---
        function analyzeObjectsAndTheme(canvas, words) {
            const ctx = canvas.getContext('2d');
            const w = canvas.width, h = canvas.height;
            const imgData = ctx.getImageData(0, 0, w, h);
            const d = imgData.data;

            // A. 主題色提取 (採樣四角與邊緣)
            const colorCounts = {};
            const sampleEdges = (x, y) => {
                const i = (y * w + x) * 4;
                const rgb = `${d[i]},${d[i+1]},${d[i+2]}`;
                colorCounts[rgb] = (colorCounts[rgb] || 0) + 1;
            };
            for(let x=0; x<w; x+=15) { sampleEdges(x, 10); sampleEdges(x, h-10); }
            for(let y=0; y<h; y+=15) { sampleEdges(10, y); sampleEdges(w-10, y); }
            const themeKey = Object.keys(colorCounts).sort((a,b) => colorCounts[b] - colorCounts[a])[0];
            const theme = themeKey.split(',').map(Number);

            // B. 建立保護遮罩 (初次梯度偵測)
            const mask = new Uint8Array(w * h);
            for (let y = 1; y < h - 1; y++) {
                for (let x = 1; x < w - 1; x++) {
                    const i = (y * w + x) * 4;
                    const lum = d[i]*0.299 + d[i+1]*0.587 + d[i+2]*0.114;
                    const lumR = d[i+4]*0.299 + d[i+5]*0.587 + d[i+6]*0.114;
                    const lumB = d[i+w*4]*0.299 + d[i+w*4+1]*0.587 + d[i+w*4+2]*0.114;
                    const grad = Math.abs(lum - lumR) + Math.abs(lum - lumB);
                    if (grad > 40) mask[y * w + x] = 1; // 發現物件邊緣
                }
            }

            // C. 排除文字區域 (文字筆劃不進入保護區)
            words.forEach(wrd => {
                const b = wrd.bbox;
                const pad = 2; // 文字周圍預留一點緩衝不保護
                for(let y = Math.max(0, b.y0 - pad); y < Math.min(h, b.y1 + pad); y++){
                    for(let x = Math.max(0, b.x0 - pad); x < Math.min(w, b.x1 + pad); x++){
                        mask[y * w + x] = 0;
                    }
                }
            });

            // D. 形態學閉合運算 (Dilation/Closing): 將 2D 連續物件內部的洞補齊，防鏤空
            const maskFinal = new Uint8Array(w * h);
            const radius = 5; // 擴張半徑，半徑越大，攝影機內部的平滑區域越不容易被鏤空
            for (let y = radius; y < h - radius; y++) {
                for (let x = radius; x < w - radius; x++) {
                    if (mask[y * w + x] === 1) {
                        for(let dy=-radius; dy<=radius; dy++){
                            for(let dx=-radius; dx<=radius; dx++){
                                maskFinal[(y+dy)*w + (x+dx)] = 1;
                            }
                        }
                    }
                }
            }
            return { theme, mask: maskFinal };
        }

        async function renderReconstructedSlide(page) {
            const wrap = document.createElement('div');
            wrap.className = 'flex flex-col gap-6 slide-in';
            wrap.innerHTML = `
                <div class="flex items-center gap-4 bg-[#161b22] px-4 py-2 rounded-xl border border-[#30363d] w-fit shadow-2xl">
                    <span class="text-[10px] font-black text-blue-500 tracking-widest uppercase">Page ${page.pageNum}</span>
                    <div class="flex items-center gap-4 text-[10px] font-mono text-gray-500">
                        <span class="text-green-500 flex items-center gap-1.5"><div class="w-1.5 h-1.5 bg-green-500 rounded-full"></div> Core Objects Preserved</span>
                        <span class="text-blue-400">Background Reconstructed</span>
                    </div>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                    <div class="bg-[#161b22] rounded-3xl p-2 border border-[#30363d] shadow-2xl relative group">
                        <canvas id="orig-${page.pageNum}" class="w-full h-auto cursor-zoom-in rounded-2xl overflow-hidden"></canvas>
                        <div class="absolute bottom-4 left-4 bg-black/50 backdrop-blur-md px-2 py-0.5 rounded text-[8px] uppercase text-gray-400 font-bold tracking-widest">Input</div>
                    </div>
                    <div class="bg-[#161b22] rounded-3xl p-2 border border-blue-500/20 shadow-2xl relative group">
                        <canvas id="magic-${page.pageNum}" class="w-full h-auto cursor-zoom-in rounded-2xl overflow-hidden"></canvas>
                        <div class="absolute bottom-4 left-4 bg-blue-600/60 backdrop-blur-md px-2 py-0.5 rounded text-[8px] uppercase text-white font-bold tracking-widest">Reconstructed</div>
                    </div>
                </div>
            `;
            elements.pagesContainer.appendChild(wrap);

            const cOrig = document.getElementById(`orig-${page.pageNum}`);
            const cMagic = document.getElementById(`magic-${page.pageNum}`);
            const w = page.fullCanvas.width, h = page.fullCanvas.height;
            cOrig.width = cMagic.width = w;
            cOrig.height = cMagic.height = h;

            cOrig.getContext('2d').drawImage(page.fullCanvas, 0, 0);
            const ctx = cMagic.getContext('2d');
            
            const rawData = cOrig.getContext('2d').getImageData(0, 0, w, h).data;
            const newImg = ctx.createImageData(w, h);
            const nd = newImg.data;
            const [tr, tg, tb] = page.themeColor;

            // 定義右下角 NotebookLM 標籤清除區 (強制不保護)
            const labelX0 = w * 0.80, labelY0 = h * 0.90;

            for (let i = 0; i < rawData.length; i += 4) {
                const x = (i/4) % w, y = Math.floor((i/4) / w);
                const maskIdx = y * w + x;

                const isLabelArea = x > labelX0 && y > labelY0;
                const isProtected = page.protectionMask[maskIdx] === 1;

                if (!isLabelArea && isProtected) {
                    // 保留連續的重點物件像素
                    nd[i] = rawData[i]; nd[i+1] = rawData[i+1]; nd[i+2] = rawData[i+2]; nd[i+3] = 255;
                } else {
                    // 其餘全部以主題背景色覆蓋 (包含文字、格線、右下角 Logo)
                    nd[i] = tr; nd[i+1] = tg; nd[i+2] = tb; nd[i+3] = 255;
                }
            }
            
            ctx.putImageData(newImg, 0, 0);
            
            cOrig.onclick = () => openLightbox(cOrig.toDataURL(), `Page ${page.pageNum} - Original`);
            cMagic.onclick = () => openLightbox(cMagic.toDataURL(), `Page ${page.pageNum} - Reconstructed`);
            
            page.cleanedImage = cMagic.toDataURL('image/jpeg', 0.85);
        }

        elements.btnExport.onclick = async () => {
            const pptx = new pptxgen();
            pagesData.filter(p => p.selected && p.cleanedImage).forEach(p => {
                const slide = pptx.addSlide();
                slide.addImage({ data: p.cleanedImage, x:0, y:0, w:10, h:5.625 });
            });
            await pptx.writeFile({ fileName: `DeckEdit_Recon_${Date.now()}.pptx` });
        };
    </script>
</body>
</html>
