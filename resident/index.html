<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PGY轉任聘用住院醫師休假天數計算機</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="text-3xl font-bold text-center mb-8">PGY轉任住院醫師休假天數計算機</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="input-group">
                <label for="pgyYears" class="text-lg">PGY年資 (年):</label>
                <input type="number" id="pgyYears" value="2" min="0" class="focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="input-group">
                <label for="militaryMonths" class="text-lg">兵役年資 (月):</label>
                <input type="number" id="militaryMonths" value="4" min="0" class="focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="input-group md:col-span-2">
                <label for="transferDate" class="text-lg">轉任聘用住院醫師的日期:</label>
                <input type="date" id="transferDate" class="focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="input-group md:col-span-2">
                <label for="startCalcYear" class="text-lg">計算起算年份 (西元年):</label>
                <input type="number" id="startCalcYear" class="focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
        </div>

        <div class="text-center">
            <button id="calculateBtn" class="btn-primary flex items-center justify-center mx-auto">
                <span id="loadingSpinner" class="loading-spinner"></span>
                <span>開始試算</span>
            </button>
        </div>

        <div id="results" class="result-section hidden mt-8">
            <h2 class="text-2xl font-semibold mb-4 text-blue-800">試算結果</h2>
            <div id="resultDetails">
                <!-- Results will be displayed here -->
            </div>
            <div id="errorMessage" class="text-red-600 mt-4 hidden"></div>
        </div>

        <div class="rules-section mt-8 p-6 bg-gray-100 rounded-lg shadow">
            <h2 class="text-xl font-semibold mb-4 text-gray-800">休假天數計算規則參考</h2>
            <p class="mb-2"><strong>慰勞假計算原則：</strong>初聘僱人員於二月以後到職者，得按當月至年終之在職月數比率，於次年一月起核給慰勞假；其計算方式，依前條第二項規定。第三年一月起，依前項規定給假。</p>
            <ul>
                <li>年終連續服務滿一年者，第二年起，每年應給休假七日。</li>
                <li>服務滿三年者，第四年起，每年應給休假十四日。</li>
                <li>服務滿六年者，第七年起，每年應給休假二十一日。</li>
                <li>服務滿九年者，第十年起，每年應給休假二十八日。</li>
                <li>服務滿十四年者，第十五年起，每年應給休假三十日。</li>
            </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
