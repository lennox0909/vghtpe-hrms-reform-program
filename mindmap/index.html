<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臺北榮民總醫院人事室 心智圖即時編輯器</title>
    
    <!-- 引入 Tailwind CSS 進行快速樣式排版 引入 D3.js (Markmap 核心依賴) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50 h-screen flex flex-col font-sans text-gray-800 transition-colors duration-300 overflow-hidden">

    <!-- ========================================== -->
    <!-- [HTML 區塊] 網頁結構                        -->
    <!-- ========================================== -->
    <!-- 頂部導覽列 (整合設定按鈕與響應式排版) -->
    <header class="bg-blue-800 text-white p-3 md:p-4 shadow-md flex flex-wrap justify-between items-center z-10 transition-colors duration-300 flex-shrink-0 gap-3">
        
        <!-- 左側：標題區塊與側邊欄切換 -->
        <div class="flex items-center gap-2">
            <svg class="w-6 h-6 md:w-7 md:h-7 text-white hidden sm:block" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path>
            </svg>
            <h1 class="flex flex-col gap-0.5 text-base md:text-xl lg:text-2xl font-bold tracking-wide">
                <span>臺北榮民總醫院人事室</span>
                <span class="flex items-baseline gap-2">
                    心智圖即時編輯器
                    <span class="text-[10px] md:text-xs lg:text-sm font-normal text-white/75">by Leno Tsai</span>
                </span>
            </h1>
        </div>

        <!-- 中央：UI 設定控制面板 -->
        <div class="flex items-center gap-2 md:gap-3 bg-white/10 p-1.5 md:p-2 rounded-xl backdrop-blur-sm border border-white/20">
            <!-- 收合/展開編輯區按鈕 -->
            <button id="btn-toggle-editor" class="bg-white/10 hover:bg-white/20 text-white p-1.5 rounded-lg transition-all duration-300 flex items-center justify-center border border-white/20" title="收合/展開編輯區">
                <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h12a2 2 0 012 2v12a2 2 0 01-2 2H6a2 2 0 01-2-2V6z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 4v16"></path>
                </svg>
            </button>

            <div class="w-px h-6 bg-white/30 hidden sm:block"></div>

            <!-- 展開層級控制 -->
            <div class="flex items-center gap-1 md:gap-2">
                <label for="sel-expand" class="text-xs md:text-sm font-medium px-1 whitespace-nowrap">展開</label>
                <select id="sel-expand" class="bg-white text-gray-800 text-xs md:text-sm rounded-lg px-2 py-1.5 md:px-3 md:py-2 outline-none cursor-pointer focus:ring-2 focus:ring-blue-400 font-medium shadow-sm transition-all">
                    <option value="-1">依文本設定</option>
                    <option value="1">第 1 層</option>
                    <option value="2">第 2 層</option>
                    <option value="3">第 3 層</option>
                    <option value="4">第 4 層</option>
                    <option value="5">第 5 層</option>
                    <option value="999">全部展開</option>
                </select>
            </div>
            
            <div class="w-px h-6 bg-white/30 hidden sm:block"></div>
            
            <!-- 色彩鎖定控制 -->
            <div class="flex items-center gap-1 md:gap-2">
                <label for="sel-color" class="text-xs md:text-sm font-medium px-1 whitespace-nowrap">色彩</label>
                <select id="sel-color" class="bg-white text-gray-800 text-xs md:text-sm rounded-lg px-2 py-1.5 md:px-3 md:py-2 outline-none cursor-pointer focus:ring-2 focus:ring-blue-400 font-medium shadow-sm transition-all">
                    <option value="-1">依文本設定</option>
                    <option value="0">不凍結</option>
                    <option value="1">第 1 層</option>
                    <option value="2">第 2 層</option>
                    <option value="3">第 3 層</option>
                    <option value="4">第 4 層</option>
                    <option value="5">第 5 層</option>
                </select>
            </div>
        </div>

        <!-- 右側：功能按鈕區塊 -->
        <div class="flex items-center justify-end gap-2 md:gap-3 flex-grow sm:flex-grow-0">
            <button id="btn-download-md" class="bg-teal-600 hover:bg-teal-500 text-white px-3 py-2 md:px-4 md:py-2.5 rounded-xl text-xs md:text-sm transition-colors shadow-sm flex items-center gap-1 md:gap-1.5 font-medium" title="匯出 Markdown 原始檔">
                <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                <span class="hidden lg:inline">下載 MD</span>
            </button>

            <button id="btn-download-svg" class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-2 md:px-4 md:py-2.5 rounded-xl text-xs md:text-sm transition-colors shadow-sm flex items-center gap-1 md:gap-1.5 font-medium" title="匯出當前視角的 SVG 圖片">
                <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                <span class="hidden lg:inline">下載 SVG</span>
            </button>

            <button id="btn-download" class="bg-emerald-600 hover:bg-emerald-500 text-white px-3 py-2 md:px-4 md:py-2.5 rounded-xl text-xs md:text-sm transition-colors shadow-sm flex items-center gap-1 md:gap-1.5 font-medium" title="匯出為單獨的 HTML 檔案">
                <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                <span class="hidden lg:inline">下載 HTML</span>
            </button>
            
            <button id="btn-fit" class="bg-sky-600 hover:bg-sky-500 text-white px-3 py-2 md:px-4 md:py-2.5 rounded-xl text-xs md:text-sm transition-colors shadow-sm flex items-center gap-1 md:gap-1.5 font-medium" title="將心智圖縮放至畫面中間，或恢復原視角">
                <svg class="w-4 h-4 md:w-5 md:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                <span id="fit-text" class="hidden lg:inline">適應螢幕</span>
            </button>
        </div>
    </header>

    <!-- 主要內容區 -->
    <main id="main-container" class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
        
        <!-- 左側編輯區 -->
        <section id="editor-pane" class="w-full h-1/2 md:w-2/5 md:h-full bg-white flex flex-col shadow-inner transition-colors duration-300 flex-shrink-0">
            <div class="bg-gray-100 px-4 py-3 text-sm md:text-base font-semibold text-gray-500 border-b border-gray-200 flex justify-between items-center transition-colors duration-300">
                <div class="flex items-center gap-2">
                    <span>Markdown 編輯區</span>
                    <span id="save-status" class="text-xs text-emerald-600 font-normal opacity-0 transition-opacity duration-300">已自動儲存</span>
                </div>
                <div class="flex items-center gap-2 md:gap-3">
                    <span class="hidden md:inline text-xs font-normal">支援 HTML & 數學公式</span>
                    
                    <input type="file" id="file-import" accept=".md,.txt" class="hidden">
                    <button id="btn-import-file" class="text-xs bg-indigo-500 hover:bg-indigo-600 text-white px-2 py-1.5 rounded-md transition-colors shadow-sm flex items-center gap-1" title="匯入 Markdown 或 TXT 檔案">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        <span class="hidden xl:inline">匯入檔案</span>
                    </button>
                    
                    <button id="btn-clear-editor" class="text-xs bg-red-500 hover:bg-red-600 text-white px-2 py-1.5 rounded-md transition-colors shadow-sm flex items-center gap-1" title="清除所有內容">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        <span class="hidden xl:inline">清除內容</span>
                    </button>
                </div>
            </div>
            <!-- 已將原本預設寫死的文本清空，改由 JS fetch 讀取 -->
            <textarea id="editor" class="flex-1 p-5 w-full h-full resize-none font-mono text-base md:text-lg leading-relaxed text-gray-700 bg-white transition-colors duration-300" spellcheck="false"></textarea>
        </section>

        <!-- 拖曳調整桿 (Resizer) -->
        <div id="resizer" class="w-full h-3 md:w-3 md:h-full bg-gray-300 hover:bg-blue-400 active:bg-blue-500 flex items-center justify-center cursor-row-resize md:cursor-col-resize z-20 flex-shrink-0 transition-colors shadow-sm">
            <div class="flex md:flex-col gap-1">
                <div class="w-1 h-1 bg-gray-500 rounded-full"></div>
                <div class="w-1 h-1 bg-gray-500 rounded-full"></div>
                <div class="w-1 h-1 bg-gray-500 rounded-full"></div>
            </div>
        </div>

        <!-- 右側心智圖顯示區 -->
        <section class="flex-1 relative bg-white transition-colors duration-300 overflow-hidden">
            <svg id="mindmap" class="w-full h-full cursor-grab active:cursor-grabbing"></svg>
        </section>
    </main>

    <!-- 自訂模態框 (Modal) -->
    <div id="custom-modal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-[100] opacity-0 transition-opacity duration-300 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl p-6 max-w-sm w-full mx-4 transform scale-95 transition-transform duration-300">
            <h3 id="modal-title" class="text-xl font-bold text-gray-800 mb-2">提示</h3>
            <p id="modal-message" class="text-gray-600 mb-6 leading-relaxed">訊息內容</p>
            <div class="flex justify-end gap-3">
                <button id="modal-cancel" class="px-4 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-xl transition-colors font-medium">取消</button>
                <button id="modal-confirm" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-xl transition-colors font-medium">確定</button>
            </div>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
