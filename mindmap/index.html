<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臺北榮民總醫院人事室 心智圖即時編輯器</title>
    
    <!-- 外部依賴 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 h-screen flex flex-col font-sans text-gray-800 overflow-hidden">

    <header class="bg-blue-800 text-white p-3 md:p-4 shadow-md flex flex-wrap justify-between items-center z-10 gap-3">
        <div class="flex items-center gap-2">
            <h1 class="flex flex-col gap-0.5 text-base md:text-xl font-bold">
                <span>臺北榮民總醫院人事室</span>
                <span class="text-xs font-normal text-white/75">心智圖即時編輯器 by Leno Tsai</span>
            </h1>
        </div>

        <div class="flex items-center gap-2 bg-white/10 p-2 rounded-xl backdrop-blur-sm">
            <button id="btn-toggle-editor" class="p-1.5 hover:bg-white/20 rounded-lg">收合</button>
            <select id="sel-expand" class="bg-white text-gray-800 text-xs rounded px-2 py-1">
                <option value="-1">依文本</option>
                <option value="1">第 1 層</option>
                <option value="999">全部展開</option>
            </select>
            <select id="sel-color" class="bg-white text-gray-800 text-xs rounded px-2 py-1">
                <option value="-1">依文本</option>
                <option value="2">鎖定 2 層</option>
            </select>
        </div>

        <div class="flex gap-2">
            <button id="btn-download-md" class="bg-teal-600 px-3 py-1.5 rounded-lg text-xs">下載 MD</button>
            <button id="btn-fit" class="bg-sky-600 px-3 py-1.5 rounded-lg text-xs"><span id="fit-text">適應螢幕</span></button>
        </div>
    </header>

    <main id="main-container" class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
        <section id="editor-pane" class="w-full h-1/2 md:w-2/5 md:h-full bg-white flex flex-col border-r">
            <div class="bg-gray-100 px-4 py-2 text-sm flex justify-between">
                <span>Markdown 編輯區</span>
                <span id="save-status" class="text-emerald-600 opacity-0 transition-opacity">已自動儲存</span>
            </div>
            <textarea id="editor" class="flex-1 p-4 font-mono text-sm leading-relaxed outline-none"></textarea>
        </section>

        <div id="resizer" class="w-full h-2 md:w-2 md:h-full bg-gray-300 cursor-row-resize md:cursor-col-resize hover:bg-blue-400"></div>

        <section class="flex-1 bg-white relative overflow-hidden">
            <svg id="mindmap" class="w-full h-full"></svg>
        </section>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
