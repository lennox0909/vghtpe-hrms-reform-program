<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>臺北榮民總醫院人事室 心智圖即時編輯器</title>
    
    <!-- 核心依賴 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 h-screen flex flex-col font-sans text-gray-800 overflow-hidden">

    <!-- 頂部導覽列 -->
    <header class="bg-blue-800 text-white p-3 md:p-4 shadow-md flex flex-wrap justify-between items-center z-10 gap-3">
        <div class="flex items-center gap-2">
            <h1 class="flex flex-col gap-0.5 text-base md:text-xl font-bold">
                <span>臺北榮民總醫院人事室</span>
                <span class="text-xs font-normal text-white/75">心智圖即時編輯器</span>
            </h1>
        </div>

        <!-- UI 設定面板 -->
        <div class="flex items-center gap-2 bg-white/10 p-1.5 rounded-xl backdrop-blur-sm border border-white/20">
            <button id="btn-toggle-editor" class="p-1.5 hover:bg-white/20 rounded-lg transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 4v16M4 6h16M4 18h16"></path></svg>
            </button>
            <div class="w-px h-6 bg-white/30 hidden sm:block"></div>
            <select id="sel-expand" class="bg-white text-gray-800 text-xs rounded px-2 py-1 outline-none cursor-pointer">
                <option value="-1">依文本設定</option>
                <option value="1">第 1 層</option>
                <option value="2">第 2 層</option>
                <option value="999">全部展開</option>
            </select>
            <select id="sel-color" class="bg-white text-gray-800 text-xs rounded px-2 py-1 outline-none cursor-pointer">
                <option value="-1">依文本設定</option>
                <option value="0">不凍結</option>
                <option value="2">第 2 層</option>
            </select>
        </div>

        <!-- 下載與適應按鈕 -->
        <div class="flex items-center gap-2">
            <button id="btn-download-md" class="bg-teal-600 hover:bg-teal-500 px-3 py-2 rounded-xl text-xs font-medium transition-colors">MD</button>
            <button id="btn-download-svg" class="bg-blue-600 hover:bg-blue-500 px-3 py-2 rounded-xl text-xs font-medium transition-colors">SVG</button>
            <button id="btn-download" class="bg-emerald-600 hover:bg-emerald-500 px-3 py-2 rounded-xl text-xs font-medium transition-colors">HTML</button>
            <button id="btn-fit" class="bg-sky-600 hover:bg-sky-500 px-3 py-2 rounded-xl text-xs font-medium transition-colors">
                <span id="fit-text">適應螢幕</span>
            </button>
        </div>
    </header>

    <main id="main-container" class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
        <!-- 左側編輯區 -->
        <section id="editor-pane" class="w-full h-1/2 md:w-2/5 md:h-full bg-white flex flex-col shadow-inner flex-shrink-0">
            <div class="bg-gray-100 px-4 py-3 text-sm font-semibold text-gray-500 border-b flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <span>Markdown 編輯區</span>
                    <span id="save-status" class="text-xs text-emerald-600 font-normal opacity-0 transition-opacity">已自動儲存</span>
                </div>
                <div class="flex gap-2">
                    <input type="file" id="file-import" accept=".md,.txt" class="hidden">
                    <button id="btn-import-file" class="bg-indigo-500 text-white px-2 py-1 rounded text-xs hover:bg-indigo-600">匯入</button>
                    <button id="btn-clear-editor" class="bg-red-500 text-white px-2 py-1 rounded text-xs hover:bg-red-600">清除</button>
                </div>
            </div>
            <textarea id="editor" class="flex-1 p-5 w-full resize-none font-mono text-base leading-relaxed text-gray-700" spellcheck="false"></textarea>
        </section>

        <!-- 拖曳調整桿 -->
        <div id="resizer" class="w-full h-3 md:w-3 md:h-full bg-gray-300 hover:bg-blue-400 cursor-row-resize md:cursor-col-resize z-20 transition-colors flex items-center justify-center">
            <div class="flex md:flex-col gap-1">
                <div class="w-1 h-1 bg-gray-500 rounded-full"></div>
                <div class="w-1 h-1 bg-gray-500 rounded-full"></div>
            </div>
        </div>

        <!-- 右側心智圖顯示區 -->
        <section class="flex-1 relative bg-white overflow-hidden">
            <svg id="mindmap" class="w-full h-full cursor-grab active:cursor-grabbing"></svg>
        </section>
    </main>

    <!-- 自訂模態框 -->
    <div id="custom-modal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-[100] opacity-0 transition-opacity duration-300 backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl p-6 max-w-sm w-full mx-4 transform scale-95 transition-transform duration-300">
            <h3 id="modal-title" class="text-xl font-bold text-gray-800 mb-2">提示</h3>
            <p id="modal-message" class="text-gray-600 mb-6 leading-relaxed"></p>
            <div class="flex justify-end gap-3">
                <button id="modal-cancel" class="px-4 py-2 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-xl font-medium">取消</button>
                <button id="modal-confirm" class="px-4 py-2 text-white rounded-xl font-medium"></button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
