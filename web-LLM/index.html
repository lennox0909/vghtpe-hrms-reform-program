<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 針對行動裝置最佳化，禁止不必要的縮放，並支援 PWA 樣式的全螢幕 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <!-- 加入 base 標籤：修復 iframe 預覽環境 (about:srcdoc) 造成的 Invalid URL 錯誤 -->
    <base href="https://localhost/">
    <title>WebGPU AI 終端機</title>
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <script>
        // 雙重保險：手動提供 createRequire 的 Polyfill，防止某些深層依賴模組誤判 Node 環境而報錯
        if (typeof window.createRequire === 'undefined') {
            window.createRequire = function() {
                return function() { return {}; };
            };
        }
    </script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans h-screen flex flex-col overflow-hidden">

    <!-- 頂部導覽列 -->
    <header class="bg-slate-800 border-b border-slate-700 p-3 sm:p-4 shadow-md flex-shrink-0 z-10">
        <div class="max-w-5xl mx-auto flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 sm:gap-4">
            <div class="flex items-center gap-2">
                <!-- Cpu Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-400 sm:w-8 sm:h-8">
                    <rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect>
                    <rect x="9" y="9" width="6" height="6"></rect>
                    <line x1="9" y1="1" x2="9" y2="4"></line>
                    <line x1="15" y1="1" x2="15" y2="4"></line>
                    <line x1="9" y1="20" x2="9" y2="23"></line>
                    <line x1="15" y1="20" x2="15" y2="23"></line>
                    <line x1="20" y1="9" x2="23" y2="9"></line>
                    <line x1="20" y1="14" x2="23" y2="14"></line>
                    <line x1="1" y1="9" x2="4" y2="9"></line>
                    <line x1="1" y1="14" x2="4" y2="14"></line>
                </svg>
                <div>
                    <h1 class="text-lg sm:text-xl font-bold tracking-wide leading-tight">AI 聊天機器人 ( WebGPU )</h1>
                    <p class="text-[10px] sm:text-xs text-slate-400">100% 瀏覽器本地端執行 by Leno Tsai v.0.2</p>
                </div>
            </div>
            
            <!-- 行動端優化：按鈕並排且充滿寬度 -->
            <div class="flex items-center gap-2 w-full sm:w-auto">
                <select id="model-select" class="flex-1 min-w-[130px] sm:w-64 bg-slate-700 border border-slate-600 text-white text-xs sm:text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 sm:p-3 outline-none truncate h-[42px] sm:h-[46px]">
                    <option value="Qwen2-7B-Instruct-q4f16_1-MLC" selected>Qwen2 7B (強推中文)</option>
                    <option value="Llama-3.1-8B-Instruct-q4f16_1-MLC">Llama 3.1 8B (中文優良)</option>
                    <option value="Phi-3-mini-4k-instruct-q4f16_1-MLC">Phi-3 Mini 4K (輕量英文)</option>
                    <option value="gemma-2b-it-q4f16_1-MLC">Gemma 2B IT (極輕量)</option>
                </select>
                
                <button id="settings-btn" class="flex-shrink-0 p-2.5 sm:p-3 bg-slate-700 hover:bg-slate-600 border border-slate-600 rounded-lg text-slate-300 transition-colors h-[42px] sm:h-[46px] flex items-center justify-center" title="參數設定">
                    <!-- Settings Icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                </button>

                <button id="load-btn" class="flex-shrink-0 flex items-center justify-center gap-1.5 sm:gap-2 bg-blue-600 hover:bg-blue-700 disabled:bg-slate-600 text-white px-3 sm:px-4 rounded-lg text-xs sm:text-sm font-medium transition-colors h-[42px] sm:h-[46px]">
                    <span id="load-btn-icon">
                        <!-- Download Icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                    </span>
                    <span id="load-btn-text" class="hidden sm:inline">下載並載入</span>
                    <span id="load-btn-text-mobile" class="sm:hidden">載入</span>
                </button>
            </div>
        </div>
    </header>

    <!-- 參數設定面板 (預設隱藏) -->
    <div id="settings-panel" class="hidden bg-slate-800 border-b border-slate-700 p-4 shadow-inner flex-shrink-0 transition-all z-0">
        <div class="max-w-5xl mx-auto flex flex-col sm:flex-row gap-6 sm:gap-8">
            <!-- Temperature -->
            <div class="flex-1">
                <div class="flex justify-between mb-3 sm:mb-2">
                    <label for="temp-slider" class="text-xs sm:text-sm font-medium text-slate-300">Temperature (隨機性)</label>
                    <span id="temp-val" class="text-xs sm:text-sm font-bold text-blue-400">0.6</span>
                </div>
                <!-- 放大滑桿觸控區域 -->
                <input type="range" id="temp-slider" min="0" max="2" step="0.1" value="0.6" class="w-full h-3 sm:h-2 bg-slate-600 rounded-lg appearance-none cursor-pointer accent-blue-500">
            </div>
            <!-- Top P -->
            <div class="flex-1">
                <div class="flex justify-between mb-3 sm:mb-2">
                    <label for="top-p-slider" class="text-xs sm:text-sm font-medium text-slate-300">Top P (核取樣)</label>
                    <span id="top-p-val" class="text-xs sm:text-sm font-bold text-blue-400">0.9</span>
                </div>
                <input type="range" id="top-p-slider" min="0" max="1" step="0.05" value="0.9" class="w-full h-3 sm:h-2 bg-slate-600 rounded-lg appearance-none cursor-pointer accent-blue-500">
            </div>
        </div>
    </div>

    <!-- 警告訊息區塊 -->
    <div id="error-banner" class="hidden bg-red-900/50 border-l-4 border-red-500 p-3 sm:p-4 m-3 sm:m-4 max-w-5xl mx-auto rounded-r w-auto flex-shrink-0 z-0">
        <div class="flex items-center gap-2 sm:gap-3 text-red-200">
            <!-- AlertTriangle Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="flex-shrink-0 sm:w-5 sm:h-5">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                <line x1="12" y1="9" x2="12" y2="13"></line>
                <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
            <p id="error-text" class="text-xs sm:text-sm break-words whitespace-pre-wrap">發生錯誤</p>
        </div>
    </div>

    <!-- 對話顯示區 -->
    <main id="chat-container" class="flex-1 overflow-y-auto p-3 sm:p-4 md:p-6 scroll-smooth z-0">
        <div class="max-w-5xl mx-auto flex flex-col gap-4 sm:gap-6 relative" id="messages-area">
            
            <!-- 初始提示 (Empty State) -->
            <div id="empty-state" class="flex flex-col items-center justify-center h-full text-slate-500 mt-10 sm:mt-20 space-y-3 sm:space-y-4 px-4">
                <!-- Info Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="opacity-50 sm:w-12 sm:h-12">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="16" x2="12" y2="12"></line>
                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                </svg>
                <p class="text-sm sm:text-base text-center leading-relaxed">
                    請在上方點擊「載入」按鈕。<br/>
                    <span class="text-xs sm:text-sm text-slate-400">首次載入需下載數 GB 檔案，建議使用 Wi-Fi 環境。</span><br/>
                    <span class="text-blue-400 text-xs sm:text-sm font-medium mt-2 inline-block">💡 建議橫置手機或使用平板獲得最佳體驗</span>
                </p>
            </div>

            <!-- 下載進度提示 -->
            <div id="loading-indicator" class="hidden bg-slate-800 rounded-xl p-5 sm:p-6 flex-col items-center justify-center space-y-3 sm:space-y-4 border border-blue-500/30 shadow-[0_0_15px_rgba(59,130,246,0.1)] mx-2 sm:mx-0">
                <!-- Loader2 Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-400 animate-spin sm:w-8 sm:h-8">
                    <line x1="12" y1="2" x2="12" y2="6"></line>
                    <line x1="12" y1="18" x2="12" y2="22"></line>
                    <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line>
                    <line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line>
                    <line x1="2" y1="12" x2="6" y2="12"></line>
                    <line x1="18" y1="12" x2="22" y2="12"></line>
                    <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line>
                    <line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line>
                </svg>
                <h3 class="text-base sm:text-lg font-medium text-slate-200">準備模型環境中</h3>
                <p id="progress-text" class="text-xs sm:text-sm text-blue-300 font-mono text-center break-all max-w-2xl px-2">啟動中...</p>
                <div class="w-full max-w-md bg-slate-700 rounded-full h-1.5 mt-2">
                    <div class="bg-blue-500 h-1.5 rounded-full relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-full bg-white/20 animate-[translateX_2s_linear_infinite]" style="transform: translateX(-100%);"></div>
                    </div>
                </div>
            </div>

            <!-- 動態產生的訊息將會插在這裡 -->

        </div>
    </main>

    <!-- 輸入區塊 -->
    <footer class="bg-slate-800 border-t border-slate-700 p-3 sm:p-4 pb-safe flex-shrink-0 z-10">
        <div class="max-w-5xl mx-auto relative flex items-end gap-2">
            <!-- 支援自動長高的 textarea -->
            <textarea
                id="chat-input"
                disabled
                placeholder="請先載入模型..."
                class="w-full bg-slate-900 border border-slate-600 text-slate-100 rounded-xl px-4 py-3 min-h-[48px] max-h-[150px] sm:max-h-[200px] resize-none focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent disabled:opacity-50 text-sm sm:text-base overflow-y-auto"
                rows="1"
                style="height: 48px;"
            ></textarea>
            <button
                id="send-btn"
                disabled
                class="flex-shrink-0 bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 disabled:text-slate-500 text-white p-3 rounded-xl transition-colors h-[48px] w-[48px] flex items-center justify-center active:scale-95"
            >
                <!-- Send Icon -->
                <svg id="send-icon-default" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
                <!-- Loader Icon (隱藏狀態) -->
                <svg id="send-icon-loading" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden animate-spin">
                    <line x1="12" y1="2" x2="12" y2="6"></line>
                    <line x1="12" y1="18" x2="12" y2="22"></line>
                    <line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line>
                    <line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line>
                    <line x1="2" y1="12" x2="6" y2="12"></line>
                    <line x1="18" y1="12" x2="22" y2="12"></line>
                    <line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line>
                    <line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line>
                </svg>
                <!-- Stop Icon (隱藏狀態) -->
                <svg id="send-icon-stop" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" class="hidden">
                    <rect x="6" y="6" width="12" height="12" rx="2" ry="2"></rect>
                </svg>
            </button>
        </div>
    </footer>
    <script type="module" src="models.js"></script>
</body>
</html>
