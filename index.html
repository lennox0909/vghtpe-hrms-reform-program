<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北榮 HRMS 改革計畫 - 數位工具箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans">

    <!-- 導航欄 -->
    <nav class="bg-white border-b border-slate-200 py-4 px-6 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <i class="fa-solid fa-hospital-user text-blue-600 text-2xl"></i>
                <span class="font-bold text-xl tracking-tight">VGHTPE HRMS Reform</span>
            </div>
            <div class="hidden md:flex space-x-6 text-sm font-medium">
                <a href="https://github.com/lennox0909/vghtpe-hrms-reform-program" class="hover:text-blue-600 transition">GitHub 原始碼</a>
            </div>
        </div>
    </nav>

    <!-- 英雄區塊 -->
    <header class="py-16 px-6 bg-gradient-to-r from-blue-700 to-indigo-800 text-white">
        <div class="max-w-4xl mx-auto text-center">
            <h1 class="text-4xl md:text-5xl font-extrabold mb-4">北榮人力資源管理系統改革計畫</h1>
            <p class="text-xl opacity-90 leading-relaxed">
                透過數位工具與結構化思維，重新定義現代醫療體系的人事管理效能。
            </p>
        </div>
    </header>

    <!-- 工具列表 -->
    <main class="max-w-5xl mx-auto py-12 px-6">
        <h2 class="text-2xl font-bold mb-8 flex items-center">
            <span class="bg-blue-600 w-2 h-8 rounded-full mr-3"></span>
            專案附屬工具
        </h2>

        <div class="grid md:grid-cols-2 gap-8">
            <!-- Diagram as Code -->
            <a href="./diagram/" class="glass-card p-8 rounded-2xl border border-slate-200 block group">
                <div class="w-14 h-14 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center mb-6 group-hover:bg-blue-600 group-hover:text-white transition-colors">
                    <i class="fa-solid fa-code text-2xl"></i>
                </div>
                <h3 class="text-xl font-bold mb-3">Diagram as Code</h3>
                <p class="text-slate-600 mb-4">
                    使用程式碼定義系統架構與業務流程圖。支援即時預覽與版本控制，確保文件與程式碼同步。
                </p>
                <span class="text-blue-600 font-semibold flex items-center text-sm">
                    進入工具 <i class="fa-solid fa-arrow-right ml-2 group-hover:translate-x-1 transition-transform"></i>
                </span>
            </a>

            <!-- Dynamic Mindmap -->
            <a href="./mindmap/" class="glass-card p-8 rounded-2xl border border-slate-200 block group">
                <div class="w-14 h-14 bg-indigo-100 text-indigo-600 rounded-xl flex items-center justify-center mb-6 group-hover:bg-indigo-600 group-hover:text-white transition-colors">
                    <i class="fa-solid fa-sitemap text-2xl"></i>
                </div>
                <h3 class="text-xl font-bold mb-3">Dynamic Mindmap</h3>
                <p class="text-slate-600 mb-4">
                    動態心智圖工具。適合進行 HRMS 模組拆解與需求發散思考，支援 Markmap 格式轉換。
                </p>
                <span class="text-indigo-600 font-semibold flex items-center text-sm">
                    進入工具 <i class="fa-solid fa-arrow-right ml-2 group-hover:translate-x-1 transition-transform"></i>
                </span>
            </a>
        </div>
    </main>

    <footer class="py-12 text-center text-slate-400 text-sm border-t border-slate-200 mt-12">
        <p>© 2024 VGHTPE HRMS Reform Program. All rights reserved.</p>
    </footer>

</body>
</html>
